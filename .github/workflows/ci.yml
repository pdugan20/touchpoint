name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build, Lint & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict --quiet

      - name: Build
        run: |
          xcodebuild -project TouchPoint.xcodeproj \
            -scheme TouchPoint \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Test
        run: |
          xcodebuild test -project TouchPoint.xcodeproj \
            -scheme TouchPoint \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Lint Claude Code config
        run: npx claude-code-lint@latest
