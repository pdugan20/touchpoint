# SwiftLint Config — TouchPoint
# Parent: .swiftlint-airbnb.yml (Airbnb custom rules)

parent_config: .swiftlint-airbnb.yml

indentation: 2

included:
  - TouchPoint

excluded:
  - .build
  - DerivedData
  - TouchPoint.xcodeproj

line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_comments: true

opt_in_rules:
  - closure_spacing
  - collection_alignment
  - empty_collection_literal
  - empty_count
  - empty_string
  - first_where
  - last_where
  - modifier_order
  - redundant_nil_coalescing
  - sorted_first_last
  - switch_case_alignment
  - unneeded_parentheses_in_closure_argument
  - yoda_condition
  - implicitly_unwrapped_optional
  - unused_optional_binding
  - fatal_error_message
  - legacy_cggeometry_functions
  - legacy_constant
  - legacy_constructor
  - legacy_nsgeometry_functions

disabled_rules:
  - todo
  - trailing_comma
  - identifier_name
  - opening_brace
  - blanket_disable_command

trailing_whitespace:
  ignores_empty_lines: false
  ignores_comments: true

cyclomatic_complexity:
  warning: 25
  error: 35

function_body_length:
  warning: 60
  error: 80

file_length:
  warning: 400
  error: 600

force_cast: warning
force_try: warning

analyzer_rules:
  - unused_import
  - unused_declaration
